services:
  - type: web
    name: proyecto-backend
    env: python
    buildCommand: pip install --upgrade pip setuptools wheel && pip install -r requirements-prod.txt
    startCommand: uvicorn Backend.api.app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    autoDeploy: true
    envVars:
      - key: DB_POSTGRES
        sync: false
      - key: DB_PROVIDER
        value: postgres
      - key: ENVIROMENT
        value: production

  - type: web
    name: proyecto-frontend
    env: python
    buildCommand: pip install --upgrade pip setuptools wheel && pip install -r Front/requirements.txt
    startCommand: python Front/app.py
    plan: free
    autoDeploy: true
